<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müşteri Hizmetleri AI - Canlı Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="crm.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-robot"></i> AI Asistan</h2>
                <span class="badge" id="chat-count">0</span>
            </div>
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="search-input" placeholder="Müşteri ara...">
            </div>
            <div id="active-filters-container" class="active-filters-container" style="display: none;">
                <!-- Filter chips will be injected here -->
            </div>
            <div class="chat-list" id="chat-list">
                <!-- Chat items will be injected here -->
                <div class="loading-spinner">Yükleniyor...</div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <div class="chat-header" id="chat-header" style="display: none;">
                <div class="chat-user-info">
                    <button id="mobile-back-btn" class="btn btn-icon" style="display: none;">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div class="avatar">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="details">
                        <h3 id="current-chat-name">Seçili Müşteri Yok</h3>
                        <span class="status online" id="bot-status-text">Bot Aktif</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button id="toggle-pause-btn" class="btn btn-pause">
                        <i class="fa-solid fa-pause"></i> Botu Sustur
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="empty-state">
                    <i class="fa-solid fa-comments"></i>
                    <p>Mesajları görmek için bir sohbet seçin</p>
                </div>
            </div>
            
            <div class="chat-input-area" id="chat-input-area" style="display: none;">
                <input type="text" id="chat-input" placeholder="Müşteriye bir mesaj yazın..." autocomplete="off">
                <button id="send-msg-btn" class="btn btn-primary" title="Mesaj Gönder"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </main>

        <!-- Right Profile Sidebar -->
        <aside class="profile-sidebar" id="profile-sidebar" style="display: none;">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-address-card"></i> Müşteri Profili</h2>
            </div>
            
            <div class="profile-content">
                <div class="form-group">
                    <label>Durum <i class="fa-solid fa-filter" style="cursor: pointer; margin-left: 5px; color: var(--accent);" onclick="addFilter('status', document.getElementById('profile-status').value)" title="Bu durumu filtreye ekle"></i></label>
                    <select id="profile-status" class="form-control">
                        <option value="Yeni Müşteri">Yeni Müşteri</option>
                        <option value="Eski Müşteri">Eski Müşteri</option>
                        <option value="Sıcak Müşteri (Sordu Almadı)">Sıcak Müşteri (Sordu Almadı)</option>
                        <option value="Sipariş Aşamasında">Sipariş Aşamasında</option>
                        <option value="Kargo Bekliyor">Kargo Bekliyor</option>
                        <option value="Tamamlandı">Tamamlandı</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Öncelik <i class="fa-solid fa-filter" style="cursor: pointer; margin-left: 5px; color: var(--accent);" onclick="addFilter('priority', document.getElementById('profile-priority').value)" title="Bu önceliği filtreye ekle"></i></label>
                    <select id="profile-priority" class="form-control">
                        <option value="Yüksek">Yüksek</option>
                        <option value="Orta">Orta</option>
                        <option value="Normal">Normal</option>
                        <option value="Düşük">Düşük</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Etiketler</label>
                    <div class="tags-input-container">
                        <input type="text" id="tag-input" placeholder="Etiket yazıp Enter'a basın...">
                    </div>
                    <div class="tags-list" id="tags-list">
                        <!-- Tags will be injected here -->
                    </div>
                </div>

                <div class="form-group">
                    <label>Özel Notlar</label>
                    <textarea id="profile-notes" class="form-control" placeholder="Müşteri ile ilgili notlar..."></textarea>
                </div>

                <button id="save-profile-btn" class="btn btn-primary w-100">
                    <i class="fa-solid fa-save"></i> Kaydet
                </button>
            </div>
        </aside>
    </div>

    <script src="crm.js"></script>
</body>
</html>
